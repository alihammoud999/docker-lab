version: "3.8"

services:
  api:
    image: ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/docker-app:v1
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: CHANGE_ME_FOR_SWARM_TEST_ONLY
      DB_NAME: docker_lab
      APP_VERSION: v1
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: CHANGE_ME_FOR_SWARM_TEST_ONLY
      MYSQL_DATABASE: docker_lab
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  db_data:
